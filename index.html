<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abdulkader & Raghad</title>

<style>
html,body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
background:#f3efe7;
}

body{
cursor:pointer;
}

/* full invitation */
#screen{
position:fixed;
inset:0;
background:url('frontpage.png') center center / cover no-repeat;
z-index:1;
}

/* flap hidden until tap */
#flap{
position:fixed;
top:0;
left:50%;
transform:translateX(-50%);
width:100%;
height:auto;
z-index:5;
pointer-events:none;
opacity:0;
}

/* start animation after tap */
.open #flap{
opacity:1;
animation:openFlap 1.8s forwards;
}

.open #screen{
opacity:0;
transition:opacity 1.8s ease;
}

@keyframes openFlap{
0%{
top:0;
opacity:1;
}
100%{
top:-120%;
opacity:0;
}
}
</style>
</head>

<body onclick="openInvite()">

<div id="screen"></div>
<img src="flap.png" id="flap">

<audio id="music">
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>
function openInvite(){

document.getElementById("music").play();

document.body.classList.add("open");

setTimeout(()=>{
window.location.href="page2.html";
},1900);

}
</script>

</body>
</html>
