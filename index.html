<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abdulkader & Raghad</title>

<style>
html,body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
background:#ece7de;
font-family:Arial,sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
}

#screen{
width:390px;
height:844px;
max-width:100vw;
max-height:100vh;

background:url('frontpage.png') center center / cover no-repeat;

box-shadow:0 20px 50px rgba(0,0,0,.12);
border-radius:0px;

transition:opacity 1.2s ease;
animation:breath 5s ease-in-out infinite;
}

.fadeout{
opacity:0;
}

@keyframes breath{
0%,100%{transform:scale(1);}
50%{transform:scale(1.01);}
}
</style>
</head>

<body onclick="openInvite()">

<div id="screen"></div>

<script>
function openInvite(){
document.getElementById("screen").classList.add("fadeout");
}
</script>

</body>
</html>
