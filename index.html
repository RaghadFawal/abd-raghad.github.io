<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abdulkader & Raghad</title>

<style>
html,body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
background:#f3efe7;
}

body{
cursor:pointer;
}

#screen{
position:fixed;
inset:0;
background:url('frontpage.png') center center / cover no-repeat;
transition:opacity 1.2s ease;
animation:breath 5s ease-in-out infinite;
}

.fadeout{
opacity:0;
}

@keyframes breath{
0%,100%{
transform:scale(1.03);
}
50%{
transform:scale(1.05);
}
}
</style>
</head>

<body onclick="openInvite()">

<div id="screen"></div>

<audio id="music">
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>
function openInvite(){
document.getElementById("music").play();
document.getElementById("screen").classList.add("fadeout");

setTimeout(()=>{
window.location.href="page2.html";
},1200);
}
</script>

</body>
</html>
