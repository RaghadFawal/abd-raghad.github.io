<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abdulkader & Raghad</title>

<style>
html,body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
background:#f3efe7;
}

body{
cursor:pointer;
}

/* main image */
#screen{
position:fixed;
inset:0;
background:url('frontpage.png') center center / cover no-repeat;
transition:opacity 1.2s ease;
animation:breath 5s ease-in-out infinite;
}

/* opening flap */
#flap{
position:fixed;
top:0;
left:0;
width:100%;
height:52%;
background:#efe9dc;
clip-path:polygon(0 0,100% 0,50% 100%);
transform-origin:top center;
transition:transform 1.5s ease;
z-index:5;
opacity:.92;
box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.open #flap{
transform:rotateX(180deg);
}

.fadeout{
opacity:0;
}

@keyframes breath{
0%,100%{
transform:scale(1.03);
}
50%{
transform:scale(1.05);
}
}
</style>
</head>

<body onclick="openInvite()">

<div id="screen"></div>
<div id="flap"></div>

<audio id="music">
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>
function openInvite(){
document.getElementById("music").play();

document.body.classList.add("open");

setTimeout(()=>{
document.getElementById("screen").classList.add("fadeout");
document.getElementById("flap").classList.add("fadeout");
},1500);

setTimeout(()=>{
window.location.href="page2.html";
},2600);
}
</script>

</body>
</html>
